<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidelines - Project Work Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .guidelines-content {
            white-space: pre-line;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header bg-white border-0 pt-4">
                        <h2 class="card-title text-center mb-0">📖 Project Work Guidelines</h2>
                        <p class="text-center text-muted">Complete guidelines for academic project work submission</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="guidelines-content bg-light p-4 rounded">
{{ guidelines }}
                        </div>

                        <hr class="my-4">

                        <div class="text-center">
                            <a href="{{ url_for('planner') }}" class="btn btn-primary me-2">
                                📝 Start Planning
                            </a>
                            <a href="{{ url_for('index') }}" class="btn btn-secondary">
                                🏠 Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
